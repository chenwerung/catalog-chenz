<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Pilihan Nuflycen</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --primary: #00f2fe;
            --secondary: #4facfe;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        header { text-align: center; padding: 3rem 1rem 1.5rem; }
        header h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        header h1 span { background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: var(--text-muted); font-size: 0.95rem; }

        .category-nav { display: flex; overflow-x: auto; gap: 10px; padding: 0.5rem 1rem 1.5rem; scrollbar-width: none; justify-content: center; }
        .category-nav::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: var(--card-bg); color: var(--text-main); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.6rem 1.2rem; border-radius: 50px; font-size: 0.9rem; white-space: nowrap;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .cat-btn.active, .cat-btn:hover { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: #000; font-weight: 600; border-color: transparent; }

        .search-container { max-width: 600px; width: 100%; margin: 0 auto 1.5rem auto; padding: 0 1rem; }
        .search-bar {
            width: 100%; padding: 0.8rem 1.5rem; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--card-bg); color: var(--text-main); outline: none; transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }

        .container {
            max-width: 1200px; width: 100%; margin: 0 auto; padding: 0 1.5rem 3rem;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 260px));
            justify-content: center; gap: 1.5rem; flex-grow: 1;
        }

        .product-card {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px; padding: 0.8rem; display: flex; flex-direction: column; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0, 242, 254, 0.15); }
        .product-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 12px; margin-bottom: 0.8rem; background: #2a2a30; }
        
        .tag { font-size: 0.7rem; color: var(--primary); background: rgba(255, 255, 255, 0.1); padding: 0.2rem 0.6rem; border-radius: 4px; margin-bottom: 0.5rem; display: inline-block; text-transform: uppercase; }
        .product-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; line-height: 1.3; height: 2.6rem; overflow: hidden; }
        .product-price { font-size: 0.95rem; color: var(--primary); font-weight: 600; margin-bottom: 0.5rem; }
        .product-desc { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex-grow: 1; }
        
        .buy-btn { display: block; text-align: center; background: #fff; color: #000; text-decoration: none; padding: 0.6rem; border-radius: 8px; font-weight: 600; margin-top: auto; transition: 0.3s; }
        .buy-btn:hover { background: var(--primary); }

        footer { text-align: center; padding: 1.5rem; background: rgba(0,0,0,0.3); color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05); }
        footer span { color: var(--primary); }

        @media (max-width: 768px) {
            .category-nav { justify-content: flex-start; }
            .container { grid-template-columns: repeat(2, 1fr); padding: 0 1rem 6rem; gap: 10px; }
            footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,15,19,0.9); backdrop-filter: blur(10px); z-index: 1000; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Pilihan <span>Nuflycen</span></h1>
        <p>Racun outfit & barang kekinian. Klik buat checkout! 🛒</p>
    </header>

    <nav class="category-nav">
        <div class="cat-btn active" data-filter="semua">🔥 Semua</div>
        <div class="cat-btn" data-filter="sepatu">👟 Sepatu</div>
        <div class="cat-btn" data-filter="baju">👕 Baju</div>
        <div class="cat-btn" data-filter="celana">👖 Celana</div>
        <div class="cat-btn" data-filter="aksesoris">🕶️ Aksesoris</div>
    </nav>

    <div class="search-container">
        <input type="text" id="search-input" class="search-bar" placeholder="🔍 Cari kategori atau nama produk...">
    </div>

    <div class="container" id="product-container">
        <p style="text-align:center; grid-column: 1/-1;">Menyiapkan koleksi...</p>
    </div>

    <footer>&copy; 2026 <span>Nuflycen Werung</span>. All rights reserved.</footer>

    <script>
        const sheetCSVUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTi00AuEDOEGeRZj5hKL0dOEL4yIEuiFpzwuLWS522CJ4-dHGEaWlIdkbRVofgjrhIrP5tTWGSsSwPV/pub?output=csv';

        async function init() {
            try {
                const response = await fetch(sheetCSVUrl + '&t=' + Date.now());
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const container = document.getElementById('product-container');
                container.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 5 && cols[1].trim() !== "") {
                        const kategori = cols[0].replace(/"/g, "").trim();
                        const nama = cols[1].replace(/"/g, "").trim();
                        const harga = cols[2].replace(/"/g, "").trim();
                        const gambar = cols[3].replace(/["\r]/g, "").trim();
                        const link = cols[4].replace(/["\r]/g, "").trim();
                        const deskripsi = cols[5] ? cols[5].replace(/"/g, "").trim() : "";

                        const card = document.createElement('div');
                        card.className = 'product-card';
                        // Menyimpan kategori di atribut data agar mudah dicari
                        card.setAttribute('data-category', kategori.toLowerCase());
                        card.innerHTML = `
                            <img src="${gambar}" class="product-img" onerror="this.src='https://via.placeholder.com/300?text=Gambar+Gagal+Muat'">
                            <span class="tag">${kategori}</span>
                            <h2 class="product-title">${nama}</h2>
                            <p class="product-price">Rp ${harga}</p>
                            <p class="product-desc">${deskripsi}</p>
                            <a href="${link}" target="_blank" class="buy-btn">Cek Promo</a>
                        `;
                        container.appendChild(card);
                    }
                });
                setupLogic();
            } catch (err) {
                document.getElementById('product-container').innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Gagal memuat data.</p>';
            }
        }

        function setupLogic() {
            const searchInput = document.getElementById('search-input');
            const btns = document.querySelectorAll('.cat-btn');

            function filter() {
                const query = searchInput.value.toLowerCase();
                const activeCatFilter = document.querySelector('.cat-btn.active').getAttribute('data-filter');
                
                document.querySelectorAll('.product-card').forEach(card => {
                    const title = card.querySelector('.product-title').innerText.toLowerCase();
                    const category = card.getAttribute('data-category'); // Mengambil kategori produk
                    
                    // Logika Pencarian: Cek apakah query ada di Judul ATAU di Kategori
                    const matchSearch = title.includes(query) || category.includes(query);
                    
                    // Logika Tombol Kategori
                    const matchCatBtn = activeCatFilter === 'semua' || category === activeCatFilter;

                    if (matchSearch && matchCatBtn) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }

            searchInput.addEventListener('input', filter);
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filter();
                });
            });
        }

        init();
    </script>
</body>
</html>
